<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f3ec">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Freshket">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Freshket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#f7f3ec;--cream2:#efe9de;--white:#ffffff;--text:#1a1510;--text-mid:#6b5f50;--text-dim:#a89880;
  --green:#2d6a4f;--green-light:#d8f3dc;--green-mid:#52b788;
  --orange:#e07b39;--orange-light:#fdf0e6;
  --red:#c1440e;--red-light:#fdeae3;
  --blue:#2c6e9b;--blue-light:#dff0fb;
  --gold:#c8922a;--gold-light:#fef3dc;
  --border:#ddd5c6;--shadow:0 2px 12px rgba(26,21,16,0.08);--radius:16px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;overflow-x:hidden}
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--white);border-bottom:1.5px solid var(--border);padding:calc(var(--safe-top) + 10px) 16px 10px;box-shadow:0 2px 16px rgba(26,21,16,0.06)}
.header-inner{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.header-top{display:flex;align-items:center;gap:8px}
.logo-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--green);letter-spacing:-0.5px}
.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none;font-size:16px}
#search{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px 9px 34px;outline:none;transition:border-color 0.2s}
#search:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,106,79,0.1);background:var(--white)}
#search::placeholder{color:var(--text-dim)}
.scan-btn{background:var(--orange-light);color:var(--orange);border:1.5px solid #f0c8a8;border-radius:12px;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s}
.scan-btn:active{transform:scale(0.92)}
.add-btn{background:var(--green);color:white;border:none;border-radius:12px;width:38px;height:38px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(45,106,79,0.3);transition:transform 0.15s}
.add-btn:active{transform:scale(0.92)}
.filterbar{overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filterbar::-webkit-scrollbar{display:none}
.filter-row{display:flex;gap:6px}
.chip{background:var(--cream);border:1.5px solid var(--border);border-radius:20px;color:var(--text-mid);font-size:12px;font-weight:500;padding:5px 13px;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.chip.active{background:var(--green);border-color:var(--green);color:white}
.chip:active{transform:scale(0.95)}
.chip-live{border-color:#e53e3e;color:#e53e3e}
.chip-live.active{background:#e53e3e;border-color:#e53e3e;color:white}
.content{padding-top:calc(var(--safe-top) + 128px);padding-bottom:calc(var(--safe-bottom) + 80px);max-width:600px;margin:0 auto;padding-left:16px;padding-right:16px}
.comparison-header{padding:16px 0 8px;display:flex;align-items:baseline;gap:8px}
.comparison-title{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--text)}
.comparison-subtitle{font-size:12px;color:var(--text-dim)}
.comparison-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.comp-row{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;position:relative;transition:background 0.15s}
.comp-row:last-child{border-bottom:none}
.comp-row:active{background:var(--cream)}
.rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rank-1{background:var(--gold-light);color:var(--gold)}
.rank-2,.rank-3{background:var(--cream2);color:var(--text-mid)}
.rank-other{background:var(--cream);color:var(--text-dim);font-size:11px}
.comp-main{flex:1;min-width:0}
.comp-store{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-qty{font-size:11px;color:var(--text-dim);margin-top:2px}
.comp-equiv{font-size:10px;color:var(--green-mid);margin-top:1px}
.comp-prices{text-align:right;flex-shrink:0}
.comp-unit-price{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--text)}
.comp-unit-price.best{color:var(--green)}
.comp-total-price{font-size:11px;color:var(--text-dim);margin-top:1px}
.best-badge{position:absolute;right:14px;top:10px;background:var(--green);color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase}
.savings-bar-wrap{padding:0 14px;margin-top:4px}
.savings-bar{height:4px;background:var(--cream2);border-radius:2px;overflow:hidden;margin-bottom:2px}
.savings-bar-fill{height:100%;border-radius:2px;background:var(--green-mid)}
.savings-bar-fill.expensive{background:var(--orange)}
.savings-label{font-size:10px;color:var(--text-dim);text-align:right;padding-bottom:8px}
.store-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-hk{background:var(--orange)}.dot-costco{background:var(--blue)}.dot-sams{background:var(--green-mid)}
.section-header{display:flex;align-items:center;gap:8px;padding:16px 0 8px}
.section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.section-icon.hk{background:var(--orange-light)}.section-icon.costco{background:var(--blue-light)}.section-icon.sams{background:var(--green-light)}
.section-name{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--text)}
.section-count{font-size:11px;color:var(--text-dim);background:var(--cream2);padding:2px 8px;border-radius:10px}
.item-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow 0.2s,border-color 0.2s;position:relative;overflow:hidden}
.item-card.expanded{border-color:var(--green);box-shadow:0 4px 20px rgba(45,106,79,0.12)}
.item-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.item-card[data-type="hk"]::after{background:var(--orange)}
.item-card[data-type="costco"]::after{background:var(--blue)}
.item-card[data-type="sams"]::after{background:var(--green-mid)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.item-name{font-size:14px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.item-price-col{text-align:right;flex-shrink:0}
.item-price{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--green)}
.item-unit{font-size:10px;color:var(--text-dim);margin-top:1px}
.item-meta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.store-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px}
.store-chip.hk{background:var(--orange-light);color:var(--orange)}
.store-chip.costco{background:var(--blue-light);color:var(--blue)}
.store-chip.sams{background:var(--green-light);color:var(--green)}
.qty-text{font-size:11px;color:var(--text-dim)}
.card-expanded{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-direction:column;gap:10px}
.item-card.expanded .card-expanded{display:flex}
.exp-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-mid)}
.exp-row span:last-child{color:var(--text);font-weight:500}
.card-actions{display:flex;gap:8px;margin-top:4px}
.act-btn{flex:1;padding:9px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.act-btn:active{opacity:0.7}
.edit-btn{background:var(--cream2);color:var(--text);border:1.5px solid var(--border)}
.del-btn{background:var(--red-light);color:var(--red);border:1.5px solid #f5c4b5}
.empty{text-align:center;padding:60px 20px}
.empty-emoji{font-size:52px;margin-bottom:12px}
.empty p{font-size:14px;color:var(--text-mid)}
.statsbar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1.5px solid var(--border);padding:8px 16px calc(var(--safe-bottom) + 8px);display:flex;justify-content:space-around;z-index:99;box-shadow:0 -2px 12px rgba(26,21,16,0.06)}
.stat{text-align:center}
.stat-num{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--green)}
.stat-label{font-size:9px;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.stat-div{width:1px;background:var(--border);align-self:stretch;margin:2px 0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,21,16,0.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:24px 24px 0 0;border:1.5px solid var(--border);border-bottom:none;width:100%;max-width:600px;padding:6px 20px calc(var(--safe-bottom) + 24px);animation:slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 -8px 40px rgba(26,21,16,0.12)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.modal-title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin-bottom:18px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text-mid);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.form-group input,.form-group select{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,106,79,0.1);background:var(--white)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.btn-cancel{flex:1;padding:13px;background:var(--cream2);border:1.5px solid var(--border);border-radius:14px;color:var(--text-mid);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-save{flex:2;padding:13px;background:var(--green);border:none;border-radius:14px;color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(45,106,79,0.3)}
.btn-save:active{opacity:0.85}
.hint-text{font-size:11px;color:var(--text-dim);margin-top:4px;padding-left:4px}
.results-meta{font-size:12px;color:var(--text-dim);padding:14px 0 4px}
/* SCAN */
.scan-status{font-size:13px;color:var(--text-mid);text-align:center;padding:12px;min-height:44px;display:flex;align-items:center;justify-content:center;gap:8px}
.scan-status.loading{color:var(--green)}
.scan-status.error{color:var(--red)}
.scan-found-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.scan-item-card{background:var(--cream);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:border-color 0.2s}
.scan-item-card:active{background:var(--green-light);border-color:var(--green)}
.scan-item-info{flex:1}
.scan-item-name{font-size:14px;font-weight:600;color:var(--text)}
.scan-item-detail{font-size:11px;color:var(--text-dim);margin-top:3px}
.scan-item-price{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--green);white-space:nowrap}
.scan-add-hint{font-size:10px;color:var(--green);font-weight:600;text-align:center;margin-top:8px}
/* LIVE */
.live-banner{background:#fff5f5;border:1.5px solid #fed7d7;border-radius:12px;padding:10px 14px;margin:12px 0 8px;display:flex;align-items:center;gap:8px;font-size:12px;color:#c53030}
.live-banner strong{font-weight:700}
.live-search-wrap{margin-bottom:10px}
.live-search{width:100%;background:var(--white);border:1.5px solid #fed7d7;border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.live-search:focus{border-color:#e53e3e;box-shadow:0 0 0 3px rgba(229,62,62,0.1)}
.live-search::placeholder{color:var(--text-dim)}
.live-loading{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:14px}
.live-spinner{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.live-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.live-card-header{padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.live-product-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.live-product-brand{font-size:11px;color:var(--text-dim);margin-top:2px}
.live-price-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;transition:background 0.15s}
.live-price-row:last-child{border-bottom:none}
.live-price-row.best-live{background:var(--green-light)}
.live-store-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.live-offer{font-size:10px;color:var(--orange);margin-top:2px}
.live-price-val{font-family:'Fraunces',serif;font-size:15px;font-weight:600;color:var(--text)}
.live-price-val.cheapest{color:var(--green)}
.live-save-btn{background:var(--green);color:white;border:none;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.live-save-btn:active{opacity:0.8}
.live-best-badge{background:var(--green);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-left:6px}
.live-empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.live-tag{font-size:9px;font-weight:700;background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7;padding:1px 6px;border-radius:4px;margin-left:6px}
.live-count{font-size:11px;color:var(--text-dim);padding:4px 0 8px}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-icon">🛒</div>
        <div class="logo-text">Freshket</div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="search" placeholder="Search &amp; compare prices…" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <button class="scan-btn" onclick="openScan()">📷</button>
      <button class="add-btn" onclick="openModal()">+</button>
    </div>
    <div class="filterbar">
      <div class="filter-row">
        <div class="chip active" onclick="setFilter('all',this)">All</div>
        <div class="chip" onclick="setFilter('hk',this)">🇭🇰 HK Stores</div>
        <div class="chip" onclick="setFilter('costco',this)">Costco SZ</div>
        <div class="chip" onclick="setFilter('sams',this)">Sam's SZ</div>
        <div class="chip" onclick="setFilter('hkd',this)">HKD only</div>
        <div class="chip" onclick="setFilter('cny',this)">CNY only</div>
        <div class="chip chip-live" onclick="setFilter('live',this)">🔴 Live HK</div>
      </div>
    </div>
  </div>
</div>

<div class="content" id="content"></div>

<div class="statsbar">
  <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Items</div></div>
  <div class="stat-div"></div>
  <div class="stat"><div class="stat-num" id="sHK">0</div><div class="stat-label">HK Stores</div></div>
  <div class="stat-div"></div>
  <div class="stat"><div class="stat-num" id="sCostco">0</div><div class="stat-label">Costco SZ</div></div>
  <div class="stat-div"></div>
  <div class="stat"><div class="stat-num" id="sSams">0</div><div class="stat-label">Sam's SZ</div></div>
</div>

<!-- SCAN -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleScanImage(event)">
<input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleScanImage(event)">
<div class="modal-overlay" id="scanOverlay" onclick="handleScanOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 Scan Price Tag</div>
    <div id="scanPreviewWrap" style="display:none;margin-bottom:14px;">
      <img id="scanPreview" style="width:100%;border-radius:12px;max-height:220px;object-fit:cover;">
    </div>
    <div id="scanStatus" class="scan-status">Take a photo of a price tag or receipt</div>
    <div id="scanResults" style="display:none;">
      <div class="scan-found-label">Found items — tap to add:</div>
      <div id="scanItems"></div>
    </div>
    <div class="modal-btns" style="margin-top:14px;">
      <button class="btn-cancel" onclick="closeScan()">Close</button>
      <button class="btn-save" style="flex:1;" onclick="triggerGallery()">🖼️ Gallery</button>
      <button class="btn-save" style="flex:1;" onclick="triggerCamera()">📷 Camera</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT -->
<div class="modal-overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Item</div>
    <div class="form-group"><label>Item Name</label><input type="text" id="fItem" placeholder="e.g. Carrots"></div>
    <div class="form-row">
      <div class="form-group"><label>Quantity</label><input type="text" id="fQty" placeholder="e.g. 500g, 2pcs, 1kg"></div>
      <div class="form-group"><label>Currency</label><select id="fCurrency"><option value="HKD">HKD</option><option value="CNY">CNY</option></select></div>
    </div>
    <div class="form-group"><label>Price</label><input type="number" id="fPrice" placeholder="0.00" step="0.01" min="0"></div>
    <div class="form-group"><label>Store</label>
      <select id="fStore">
        <option>PARKnSHOP</option><option>Wellcome</option><option>Taste</option>
        <option>Sweet Decorations</option><option>DS Groceries</option>
        <option>DON DON DONKI</option><option>Green (HK)</option>
        <option>Costco Shenzhen</option><option>Sam's Club Shenzhen</option><option>Other</option>
      </select>
    </div>
    <div class="hint-text">💡 Tip: use "500g", "1kg", "2pcs", "1L" for best price comparison</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<script>
var CNY_TO_HKD = 1.07;
var OPW_PROXY = 'https://opw-proxy-red.vercel.app/api/prices';

var SEED = [
  {item:'White vinegar',qty:'500ml',currency:'HKD',price:12.9,store:'PARKnSHOP'},
  {item:'Citric acid',qty:'30g',currency:'HKD',price:8.1,store:'Sweet Decorations'},
  {item:'Carrots',qty:'500g',currency:'HKD',price:8.9,store:'Wellcome'},
  {item:'Carrots, Australian',qty:'1kg',currency:'HKD',price:13.0,store:'Wellcome'},
  {item:'Carrots, Australian',qty:'1kg',currency:'HKD',price:14.9,store:'Taste'},
  {item:'Carrots',qty:'1kg',currency:'HKD',price:10.9,store:'Taste'},

// ── Unit parsing ──
function parseQty(s) {
  if (!s || s==='???' || s==='—') return null;
  s = s.toLowerCase().trim();
  var m;
  m = s.match(/^([\d.]+)\s*[x\xd7]\s*([\d.]+)\s*(g|kg|ml|l|pcs?|pc|lb)?/);
  if (m) return norm(parseFloat(m[1])*parseFloat(m[2]), m[3]||'unit');
  m = s.match(/^per\s*(lb|kg|g|ml|l)/);
  if (m) return norm(1, m[1]);
  m = s.match(/([\d.]+)\s*(g|kg|ml|l|lb|pcs?|pc|pieces?|pack|each)/);
  if (m) return norm(parseFloat(m[1]), m[2]);
  m = s.match(/^([\d.]+)/);
  if (m) return norm(parseFloat(m[1]), 'unit');
  return null;
}
function norm(amt, u) {
  u = (u||'').toLowerCase().replace(/s$/,'');
  if (u==='g') return {amount:amt/1000,unit:'kg'};
  if (u==='kg') return {amount:amt,unit:'kg'};
  if (u==='ml') return {amount:amt/1000,unit:'L'};
  if (u==='l') return {amount:amt,unit:'L'};
  if (u==='lb') return {amount:amt*0.4536,unit:'kg'};
  if (u==='pc'||u==='pcs'||u==='piece'||u==='each') return {amount:amt,unit:'pc'};
  return {amount:amt,unit:u||'unit'};
}
function ppu(item) {
  var p = parseQty(item.qty);
  if (!p||p.amount===0) return null;
  return {ppu:item.price/p.amount, unit:p.unit};
}
function toHKD(price, cur) { return cur==='CNY' ? price*CNY_TO_HKD : price; }
function fmtPPU(v, unit, cur) {
  var sym = cur==='HKD'?'HK$':'¥';
  return sym+(v<10?v.toFixed(2):v.toFixed(1))+'/'+unit;
}

var items=[], activeFilter='all', editIdx=null, scanResults=[];

function stype(store) {
  if (!store) return 'hk';
  var s=store.toLowerCase();
  if (s.includes('costco')) return 'costco';
  if (s.includes("sam's")||s.includes('sams')) return 'sams';
  return 'hk';
}

function getFiltered() {
  var q=document.getElementById('search').value.toLowerCase().trim();
  return items.filter(function(it) {

    var mf=activeFilter==='all'||activeFilter===t||(activeFilter==='hkd'&&it.currency==='HKD')||(activeFilter==='cny'&&it.currency==='CNY');
    var mq=!q||it.item.toLowerCase().includes(q)||(it.store||'').toLowerCase().includes(q)||(it.qty||'').toLowerCase().includes(q);
    return mf&&mq;
  });
}


// Convert OPW live items matching query into tracker-compatible format
function getLiveMatches(query) {
  if (!opwData || !query || query.length < 2) return [];
  var q = query.toLowerCase();
  var results = [];
  opwData.forEach(function(prod) {
    var name = (prod.name && prod.name.en) ? prod.name.en : '';
    var brand = (prod.brand && prod.brand.en) ? prod.brand.en : '';
    if (!name.toLowerCase().includes(q) && !brand.toLowerCase().includes(q)) return;
    var prices = prod.prices || [];
    prices.forEach(function(entry) {
      var storeName = STORE_NAMES[entry.supermarketCode] || entry.supermarketCode;
      var price = parseFloat(entry.price);
      if (isNaN(price)) return;
      // Extract qty from product name (e.g. "Butter 454g" -> "454g")
      var qtyMatch = name.match(/([\d.]+\s*(?:g|kg|ml|l|pcs?|pc))/i);
      var qty = qtyMatch ? qtyMatch[1] : '';
      // Find offer
      var offer = '';
      if (prod.offers) prod.offers.forEach(function(o) {
        if (o.supermarketCode === entry.supermarketCode && o.en) offer = o.en;
      });
      results.push({
        item: name,
        qty: qty,
        currency: 'HKD',
        price: price,
        store: storeName,
        _live: true,
        _brand: brand,
        _offer: offer
      });
    });
  });
  return results;
}

function render() {
  var q=document.getElementById('search').value.trim();
  var content=document.getElementById('content');
  var hkN=items.filter(function(i){return stype(i.store)==='hk';}).length;
  var czN=items.filter(function(i){return stype(i.store)==='costco';}).length;
  var szN=items.filter(function(i){return stype(i.store)==='sams';}).length;
  document.getElementById('sTotal').textContent=items.length;
  document.getElementById('sHK').textContent=hkN;
  document.getElementById('sCostco').textContent=czN;
  document.getElementById('sSams').textContent=szN;

  if (activeFilter==='live') { renderLive(content); return; }

  // Auto-fetch OPW data in background so it's ready for searches
  if (!opwData && !opwLoading) fetchOPW();

  var filtered=getFiltered();
  if (q.length>0) {
    // Merge live OPW results into comparison if available
    var liveItems = getLiveMatches(q);
    var merged = filtered.concat(liveItems);
    if (!merged.length) {
      content.innerHTML='<div class="empty"><div class="empty-emoji">🥦</div><p>No items found.<br>Try a different search.</p></div>';
      return;
    }
    renderComparison(merged,q,content,liveItems.length);
  } else {
    if (!filtered.length) {
      content.innerHTML='<div class="empty"><div class="empty-emoji">🥦</div><p>No items found.<br>Try a different search.</p></div>';
      return;
    }
    renderBrowse(filtered,content);
  }
}

// ── Comparison ──
function renderComparison(filtered,q,content,liveCount) {
  var groups={};
  filtered.forEach(function(it) {
    var k=it.item.toLowerCase().split(',')[0].trim();
    if (!groups[k]) groups[k]=[];
    groups[k].push(it);
  });
  var localCount = filtered.length - (liveCount||0);
  var html='<div class="results-meta">'+localCount+' saved'+(liveCount?' + '+liveCount+' live':'')+' result'+(filtered.length!==1?'s':'')+' for "<strong>'+q+'</strong>" &middot; ranked by HK$ value</div>';
  Object.keys(groups).forEach(function(key) {
    var gi=groups[key]; if (!gi.length) return;
    var wp=gi.map(function(it) {
      var p=ppu(it);
      var raw=p?p.ppu:null, hkd=raw!==null?toHKD(raw,it.currency):null;
      return {item:it,raw:raw,hkd:hkd,unit:p?p.unit:null};
    });
    var wv=wp.filter(function(x){return x.hkd!==null;}).sort(function(a,b){return a.hkd-b.hkd;});
    var wo=wp.filter(function(x){return x.hkd===null;});
    var sorted=wv.concat(wo);
    var bestH=wv.length>0?wv[0].hkd:null, worstH=wv.length>1?wv[wv.length-1].hkd:null;
    var title=gi.length===1?gi[0].item:(q.charAt(0).toUpperCase()+q.slice(1));
    html+='<div class="comparison-header"><div class="comparison-title">'+title+'</div><div class="comparison-subtitle">'+gi.length+' result'+(gi.length!==1?'s':'')+'</div></div>';
    html+='<div class="comparison-card">';
    sorted.forEach(function(e,i) {
      var it=e.item, t=stype(it.store), sym=it.currency==='HKD'?'HK$':'¥';
      var isBest=e.hkd!==null&&e.hkd===bestH&&wv.length>1;
      var rk='';
      if (e.hkd!==null) { rk=i===0?'<div class="rank-badge rank-1">🥇</div>':i===1?'<div class="rank-badge rank-2">2</div>':i===2?'<div class="rank-badge rank-3">3</div>':'<div class="rank-badge rank-other">'+(i+1)+'</div>'; }
      else rk='<div class="rank-badge rank-other">—</div>';
      var ppuStr='—', equiv='';
      if (e.raw!==null&&e.unit) { ppuStr=fmtPPU(e.raw,e.unit,it.currency); if (it.currency==='CNY'&&e.hkd!==null) equiv='\u2248 HK$'+(e.hkd<10?e.hkd.toFixed(2):e.hkd.toFixed(1))+'/'+e.unit; }
      var bar='';
      if (e.hkd!==null&&bestH!==null&&worstH!==null&&worstH!==bestH) {
        var pct=Math.round(((worstH-e.hkd)/(worstH-bestH))*100);
        var lbl=isBest?'✓ Best value':(Math.round(((e.hkd-bestH)/bestH)*100)+'% more than best');
        bar='<div class="savings-bar-wrap"><div class="savings-bar"><div class="savings-bar-fill'+(pct<30?' expensive':'')+'" style="width:'+Math.max(pct,4)+'%"></div></div><div class="savings-label">'+lbl+'</div></div>';
      }
      var isLive = it._live || false;
      var idx = isLive ? -1 : items.indexOf(it);
      html+='<div><div class="comp-row"'+(isLive?'':' onclick="toggleCard('+idx+')"')+'>';
      html+=rk+'<div class="store-dot dot-'+t+'"></div>';
      html+='<div class="comp-main"><div class="comp-store">'+it.store+(isLive?'<span class="live-tag">LIVE</span>':'')+'</div><div class="comp-qty">'+it.item+(it._brand?' · '+it._brand:'')+' · '+(it.qty||'?')+'</div>';
      if (it._offer) html+='<div class="comp-equiv" style="color:var(--orange);">🏷 '+it._offer+'</div>';
      if (equiv) html+='<div class="comp-equiv">'+equiv+'</div>';
      html+='</div><div class="comp-prices">'+(isBest?'<div class="best-badge">Best</div>':'')+
        '<div class="comp-unit-price'+(isBest?' best':'')+'">'+ppuStr+'</div>'+
        '<div class="comp-total-price">'+sym+it.price.toFixed(2)+' · '+(it.qty||'?')+'</div></div>';
      if (isLive) html+='<button class="live-save-btn" style="margin-left:8px;" data-name="'+it.item.replace(/"/g,'&amp;quot;')+'" data-store="'+it.store.replace(/"/g,'&amp;quot;')+'" data-price="'+it.price+'" onclick="event.stopPropagation();saveLiveItem(this)">+ Save</button>';
      html+='</div>'+bar+'</div>';
    });
    html+='</div>';
  });
  content.innerHTML=html;
}

// ── Browse ──
function renderBrowse(filtered,content) {
  var byStore={};
  filtered.forEach(function(it){var s=it.store||'Unknown';if(!byStore[s])byStore[s]=[];byStore[s].push(it);});
  var order=['PARKnSHOP','Wellcome','Taste','Sweet Decorations','DS Groceries','DON DON DONKI','Green (HK)','Costco Shenzhen',"Sam's Club Shenzhen"];
  var stores=Object.keys(byStore).sort(function(a,b){var ai=order.indexOf(a),bi=order.indexOf(b);return(ai<0?99:ai)-(bi<0?99:bi);});
  var icons={'PARKnSHOP':'🏪','Wellcome':'🛒','Taste':'🍽️','Sweet Decorations':'🧁','DS Groceries':'🥩','DON DON DONKI':'🎌','Green (HK)':'🌿','Costco Shenzhen':'🏬',"Sam's Club Shenzhen":'🏪'};
  var html='<div class="results-meta">'+filtered.length+' item'+(filtered.length!==1?'s':'')+'</div>';
  stores.forEach(function(store) {
    var si=byStore[store], t=stype(store), ic=icons[store]||(t==='hk'?'🇭🇰':'🇨🇳');
    html+='<div class="section-header"><div class="section-icon '+t+'">'+ic+'</div><div class="section-name">'+store+'</div><div class="section-count">'+si.length+'</div></div>';
    si.forEach(function(it) {
      var idx=items.indexOf(it), sym=it.currency==='HKD'?'HK$':'¥', p=ppu(it), ps=p?fmtPPU(p.ppu,p.unit,it.currency):null;
      html+='<div class="item-card" data-type="'+t+'" data-idx="'+idx+'" onclick="toggleCard('+idx+')">';
      html+='<div class="card-top"><div class="item-name">'+it.item+'</div><div class="item-price-col"><div class="item-price">'+sym+it.price.toFixed(2)+'</div>'+(ps?'<div class="item-unit">'+ps+'</div>':'')+'</div></div>';
      html+='<div class="item-meta"><span class="store-chip '+t+'">'+store+'</span><span class="qty-text">'+(it.qty||'—')+'</span></div>';
      html+='<div class="card-expanded"><div class="exp-row"><span>Currency</span><span>'+it.currency+'</span></div><div class="exp-row"><span>Quantity</span><span>'+(it.qty||'—')+'</span></div>'+(ps?'<div class="exp-row"><span>Price per unit</span><span>'+ps+'</span></div>':'');
      html+='<div class="card-actions"><button class="act-btn edit-btn" onclick="event.stopPropagation();editItem('+idx+')">✏️ Edit</button><button class="act-btn del-btn" onclick="event.stopPropagation();deleteItem('+idx+')">🗑 Delete</button></div></div></div>';
    });
  });
  content.innerHTML=html;
}

function toggleCard(idx) {
  var c=document.querySelector('[data-idx="'+idx+'"]'); if (!c) return;
  var was=c.classList.contains('expanded');
  document.querySelectorAll('.item-card.expanded').forEach(function(x){x.classList.remove('expanded');});
  if (!was) c.classList.add('expanded');
}

function openModal(edit) {
  editIdx=(edit!==undefined)?edit:null;
  document.getElementById('modalTitle').textContent=editIdx!==null?'Edit Item':'Add Item';
  if (editIdx!==null) {
    var it=items[editIdx];
    document.getElementById('fItem').value=it.item;
    document.getElementById('fQty').value=it.qty||'';
    document.getElementById('fCurrency').value=it.currency;
    document.getElementById('fPrice').value=it.price;
    document.getElementById('fStore').value=it.store||'';
  } else {
    document.getElementById('fItem').value='';
    document.getElementById('fQty').value='';
    document.getElementById('fCurrency').value='HKD';
    document.getElementById('fPrice').value='';
    document.getElementById('fStore').value='PARKnSHOP';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){document.getElementById('fItem').focus();},350);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); editIdx=null; }
function handleOverlay(e) { if (e.target===document.getElementById('overlay')) closeModal(); }
function saveItem() {
  var itm=document.getElementById('fItem').value.trim();
  var qty=document.getElementById('fQty').value.trim();
  var cur=document.getElementById('fCurrency').value;
  var price=parseFloat(document.getElementById('fPrice').value);
  var store=document.getElementById('fStore').value;
  if (!itm||isNaN(price)||price<0) { document.getElementById('fItem').focus(); return; }
  if (editIdx!==null) items[editIdx]=Object.assign({},items[editIdx],{item:itm,qty:qty,currency:cur,price:price,store:store});
  else items.push({item:itm,qty:qty,currency:cur,price:price,store:store,id:Date.now()});
  save(); closeModal(); render();
}
function editItem(idx) { openModal(idx); }
function deleteItem(idx) {
  if (!confirm('Delete "'+items[idx].item+'"?')) return;
  items.splice(idx,1); save(); render();
}

function handleScanImage(event) {
  var file=event.target.files[0]; if (!file) return;
  var reader=new FileReader();
  reader.onload=function(e) {
    var full=e.target.result;
    document.getElementById('scanPreview').src=full;
    document.getElementById('scanPreviewWrap').style.display='block';
    document.getElementById('scanResults').style.display='none';
    var st=document.getElementById('scanStatus');
    st.className='scan-status loading'; st.textContent='⏳ Analysing image…';
    var b64=full.split(',')[1], mime=file.type||'image/jpeg';
    fetch('https://opw-proxy-red.vercel.app/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64,mimeType:mime})})
    .then(function(r){return r.json();})
    .then(function(data) {
      var parsed=[];
      if (data.items && Array.isArray(data.items)) {
        parsed = data.items;
      } else if (data.content) {
        var txt=''; data.content.forEach(function(b){if(b.type==='text')txt+=b.text;});
        try { parsed=JSON.parse(txt.replace(/```json|```/g,'').trim()); } catch(err) { console.error(err); }
      }
      if (!Array.isArray(parsed)||!parsed.length) { st.className='scan-status error'; st.textContent='❌ No items found. Try a clearer photo.'; return; }
      st.className='scan-status'; st.textContent='✅ Found '+parsed.length+' item'+(parsed.length>1?'s':'');
      scanResults=parsed;
      var html='';
      parsed.forEach(function(it,i) {
        var sym=it.currency==='HKD'?'HK$':'¥';
        html+='<div class="scan-item-card" onclick="addScannedItem('+i+')">';
        html+='<div class="scan-item-info"><div class="scan-item-name">'+(it.item||'')+'</div>';
        html+='<div class="scan-item-detail">'+(it.qty||'?')+' · '+it.currency+(it.store?' · '+it.store:'')+'</div></div>';
        html+='<div class="scan-item-price">'+sym+parseFloat(it.price).toFixed(2)+'</div></div>';
      });
      html+='<div class="scan-add-hint">Tap an item to add it to your tracker</div>';
      document.getElementById('scanItems').innerHTML=html;
      document.getElementById('scanResults').style.display='block';
    })
    .catch(function(err){console.error(err);st.className='scan-status error';st.textContent='❌ Error. Please try again.';});
  };
  reader.readAsDataURL(file); event.target.value='';
}
function addScannedItem(idx) {
  var it=scanResults[idx]; if (!it) return;
  closeScan(); openModal();
  setTimeout(function() {
    document.getElementById('fItem').value=it.item||'';
    document.getElementById('fQty').value=it.qty||'';
    document.getElementById('fCurrency').value=it.currency==='CNY'?'CNY':'HKD';
    document.getElementById('fPrice').value=it.price?parseFloat(it.price).toFixed(2):'';
    if (it.store) {
      var sel=document.getElementById('fStore'), opts=Array.from(sel.options);
      for (var i=0;i<opts.length;i++) { if (opts[i].value.toLowerCase().includes(it.store.toLowerCase().split(' ')[0])) { sel.value=opts[i].value; break; } }
    }
  },350);
}

// ── LIVE HK ──
var STORE_NAMES={'WELLCOME':'Wellcome','PARKNSHOP':'PARKnSHOP','JASONS':'Market Place by Jasons','WATSONS':'Watsons','AEON':'AEON','DCHFOOD':'DCH Food Mart'};

function renderLive(content) {
  // Build shell only once
  if (!document.getElementById('liveResults')) {
    var shell='<div class="live-banner">🔴 <div><strong>Live HK Prices</strong> — Consumer Council data, updated daily across 6 major retailers</div></div>';
    shell+='<div class="live-search-wrap"><input class="live-search" id="liveSearch" type="search" placeholder="Search 2,000+ products…" autocomplete="off" autocorrect="off" spellcheck="false"></div>';
    shell+='<div id="liveResults"></div>';
    content.innerHTML=shell;
    document.getElementById('liveSearch').addEventListener('input', function() {
      liveQ=this.value.trim();
      updateLiveResults();
    });
    // Pre-fill from main search if any
    var mq=document.getElementById('search').value.trim();
    if (mq) { document.getElementById('liveSearch').value=mq; liveQ=mq; }
    setTimeout(function(){ var el=document.getElementById('liveSearch'); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} },80);
  }
  updateLiveResults();
  if (!opwData && !opwLoading) fetchOPW();
}

function updateLiveResults() {
  var div=document.getElementById('liveResults'); if (!div) return;
  if (opwLoading) { div.innerHTML='<div class="live-loading"><span class="live-spinner">⏳</span> Loading live prices…</div>'; return; }
  if (!opwData) { div.innerHTML='<div class="live-loading">📡 Fetching…</div>'; return; }
  if (!liveQ||liveQ.length<2) { div.innerHTML='<div class="live-empty">Type a product name to search<br><span style="font-size:11px;color:var(--text-dim);">'+opwData.length+' products available</span></div>'; return; }
  var q=liveQ.toLowerCase();
  var res=opwData.filter(function(p) {
    return ((p.name&&p.name.en&&p.name.en.toLowerCase().includes(q))||(p.brand&&p.brand.en&&p.brand.en.toLowerCase().includes(q))||(p.cat2Name&&p.cat2Name.en&&p.cat2Name.en.toLowerCase().includes(q)));
  });
  var html='<div class="live-count">'+res.length+' product'+(res.length!==1?'s':'')+' found</div>';
  if (!res.length) { div.innerHTML=html+'<div class="live-empty">No products found for "'+liveQ+'"</div>'; return; }
  res.slice(0,30).forEach(function(prod, pi) {
    var prices=prod.prices||[]; if (!prices.length) return;
    var sorted=prices.slice().sort(function(a,b){return parseFloat(a.price)-parseFloat(b.price);});
    var name=(prod.name&&prod.name.en)?prod.name.en:'Unknown';
    var brand=(prod.brand&&prod.brand.en)?prod.brand.en:'';
    var cat=(prod.cat2Name&&prod.cat2Name.en)?prod.cat2Name.en:'';
    html+='<div class="live-card"><div class="live-card-header"><div class="live-product-name">'+name+'</div>';
    if (brand) html+='<div class="live-product-brand">'+brand+(cat?' · '+cat:'')+'</div>';
    html+='</div>';
    sorted.forEach(function(entry, ei) {
      var sn=STORE_NAMES[entry.supermarketCode]||entry.supermarketCode;
      var pr=parseFloat(entry.price), cheap=ei===0&&sorted.length>1;
      var offer='';
      if (prod.offers) prod.offers.forEach(function(o){if(o.supermarketCode===entry.supermarketCode&&o.en)offer=o.en;});
      // Store data in global array to avoid inline JSON issues
      var key='live_'+pi+'_'+ei;
      html+='<div class="live-price-row'+(cheap?' best-live':'')+'"><div>';
      html+='<div class="live-store-name">'+sn+(cheap?'<span class="live-best-badge">Cheapest</span>':'')+'</div>';
      if (offer) html+='<div class="live-offer">🏷 '+offer+'</div>';
      html+='</div><div class="live-price-val'+(cheap?' cheapest':'')+'">HK$'+pr.toFixed(2)+'</div>';
      html+='<button class="live-save-btn" data-name="'+name.replace(/"/g,'&quot;')+'" data-store="'+sn.replace(/"/g,'&quot;')+'" data-price="'+pr+'" onclick="saveLiveItem(this)">+ Save</button></div>';
    });
    html+='</div>';
  });
  if (res.length>30) html+='<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:12px;">Showing first 30 of '+res.length+'. Narrow your search.</div>';
  div.innerHTML=html;
}

function fetchOPW() {
  if (opwLoading) return;
  opwLoading=true; updateLiveResults();
  fetch(OPW_PROXY)
    .then(function(r){return r.json();})
    .then(function(data){opwData=data;opwLoading=false;updateLiveResults();})
    .catch(function(err){
      console.error('OPW fetch failed',err);
      opwLoading=false;
      var div=document.getElementById('liveResults');
      if (div) div.innerHTML='<div class="live-empty">❌ Could not load live prices.<br><span style="font-size:11px;">Check your connection.</span><br><br><button class="btn-save" style="width:auto;padding:10px 20px;" onclick="opwData=null;opwLoading=false;fetchOPW()">Retry</button></div>';
    });
}

// Use data-attributes instead of inline JSON to avoid quoting issues
function saveLiveItem(btn) {
  var name=btn.getAttribute('data-name');
  var store=btn.getAttribute('data-store');
  var price=parseFloat(btn.getAttribute('data-price'));
  openModal();
  setTimeout(function() {
    document.getElementById('fItem').value=name;
    document.getElementById('fPrice').value=price.toFixed(2);
    document.getElementById('fCurrency').value='HKD';
    var sel=document.getElementById('fStore'), opts=Array.from(sel.options), matched=false;
    for (var i=0;i<opts.length;i++) {
      if (store.toLowerCase().includes(opts[i].value.toLowerCase().split(' ')[0])||opts[i].value.toLowerCase().includes(store.toLowerCase().split(' ')[0])) {
        sel.value=opts[i].value; matched=true; break;
      }
    }
    if (!matched) { var o=document.createElement('option'); o.value=store; o.textContent=store; sel.appendChild(o); sel.value=store; }
  },350);
}

document.getElementById('search').addEventListener('input', render);
init();
