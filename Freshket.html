<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f7f3ec">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Freshket">
<title>Freshket — Grocery Price Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f7f3ec;
  --cream2: #efe9de;
  --cream3: #e5ddd0;
  --white: #ffffff;
  --text: #1a1510;
  --text-mid: #6b5f50;
  --text-dim: #a89880;
  --green: #2d6a4f;
  --green-light: #d8f3dc;
  --green-mid: #52b788;
  --orange: #e07b39;
  --orange-light: #fdf0e6;
  --red: #c1440e;
  --red-light: #fdeae3;
  --blue: #2c6e9b;
  --blue-light: #dff0fb;
  --gold: #c8922a;
  --gold-light: #fef3dc;
  --border: #ddd5c6;
  --shadow: 0 2px 12px rgba(26,21,16,0.08);
  --shadow-lg: 0 8px 32px rgba(26,21,16,0.12);
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ══ HEADER ══ */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--white);
  border-bottom: 1.5px solid var(--border);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  box-shadow: 0 2px 16px rgba(26,21,16,0.06);
}
.header-inner {
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.header-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.logo-icon {
  width: 34px; height: 34px;
  background: var(--green);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: -0.5px;
}
.search-wrap {
  flex: 1;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  pointer-events: none;
  font-size: 16px;
}
#search {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 9px 12px 9px 34px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
  background: var(--white);
}
#search::placeholder { color: var(--text-dim); }
.add-btn {
  background: var(--green);
  color: white;
  border: none;
  border-radius: 12px;
  width: 38px; height: 38px;
  font-size: 22px;
  font-weight: 400;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(45,106,79,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.add-btn:active { transform: scale(0.92); box-shadow: none; }

/* ══ FILTER BAR ══ */
.filterbar {
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filterbar::-webkit-scrollbar { display: none; }
.filter-row {
  display: flex;
  gap: 6px;
}
.chip {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  color: var(--text-mid);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}
.chip.active {
  background: var(--green);
  border-color: var(--green);
  color: white;
}
.chip:active { transform: scale(0.95); }

/* ══ CONTENT ══ */
.content {
  padding-top: calc(var(--safe-top) + 128px);
  padding-bottom: calc(var(--safe-bottom) + 80px);
  max-width: 600px;
  margin: 0 auto;
  padding-left: 16px;
  padding-right: 16px;
}

/* ══ COMPARISON VIEW (when searching) ══ */
.comparison-header {
  padding: 16px 0 8px;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.comparison-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
}
.comparison-subtitle {
  font-size: 12px;
  color: var(--text-dim);
}

.comparison-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.comp-row {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  transition: background 0.15s;
  cursor: pointer;
  position: relative;
}
.comp-row:last-child { border-bottom: none; }
.comp-row:active { background: var(--cream); }

.rank-badge {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.rank-1 { background: var(--gold-light); color: var(--gold); }
.rank-2 { background: var(--cream2); color: var(--text-mid); }
.rank-3 { background: var(--cream2); color: var(--text-mid); }
.rank-other { background: var(--cream); color: var(--text-dim); font-size: 11px; }

.comp-main { flex: 1; min-width: 0; }
.comp-store {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.comp-qty {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.comp-prices { text-align: right; flex-shrink: 0; }
.comp-unit-price {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.comp-unit-price.best { color: var(--green); }
.comp-total-price {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 1px;
}
.best-badge {
  position: absolute;
  right: 14px; top: 10px;
  background: var(--green);
  color: white;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 10px;
  text-transform: uppercase;
}

/* savings bar */
.savings-bar-wrap {
  padding: 0 14px;
  margin-top: 4px;
}
.savings-bar {
  height: 4px;
  background: var(--cream2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 2px;
}
.savings-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--green-mid);
  transition: width 0.4s ease;
}
.savings-bar-fill.expensive { background: var(--orange); }
.savings-label {
  font-size: 10px;
  color: var(--text-dim);
  text-align: right;
  padding-bottom: 8px;
}

/* store currency tag */
.store-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-hk { background: var(--orange); }
.dot-costco { background: var(--blue); }
.dot-sams { background: var(--green-mid); }

/* no comparison notice */
.no-compare {
  background: var(--gold-light);
  border: 1.5px solid #f0d495;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 12px;
  color: var(--gold);
  margin-bottom: 10px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

/* ══ BROWSE VIEW (no search) ══ */
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 16px 0 8px;
}
.section-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.section-icon.hk { background: var(--orange-light); }
.section-icon.costco { background: var(--blue-light); }
.section-icon.sams { background: var(--green-light); }
.section-name {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
.section-count {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--cream2);
  padding: 2px 8px;
  border-radius: 10px;
}

.item-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.item-card.expanded {
  border-color: var(--green);
  box-shadow: 0 4px 20px rgba(45,106,79,0.12);
}
.item-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
}
.item-card[data-type="hk"]::after { background: var(--orange); }
.item-card[data-type="costco"]::after { background: var(--blue); }
.item-card[data-type="sams"]::after { background: var(--green-mid); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.item-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  line-height: 1.3;
}
.item-price-col { text-align: right; flex-shrink: 0; }
.item-price {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--green);
}
.item-unit {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 1px;
}
.item-meta {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.store-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  letter-spacing: 0.2px;
}
.store-chip.hk { background: var(--orange-light); color: var(--orange); }
.store-chip.costco { background: var(--blue-light); color: var(--blue); }
.store-chip.sams { background: var(--green-light); color: var(--green); }
.qty-text { font-size: 11px; color: var(--text-dim); }

/* expanded */
.card-expanded {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  flex-direction: column;
  gap: 10px;
}
.item-card.expanded .card-expanded { display: flex; }
.exp-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-mid);
}
.exp-row span:last-child { color: var(--text); font-weight: 500; }
.card-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.act-btn {
  flex: 1;
  padding: 9px;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.act-btn:active { opacity: 0.7; }
.edit-btn { background: var(--cream2); color: var(--text); border: 1.5px solid var(--border); }
.del-btn { background: var(--red-light); color: var(--red); border: 1.5px solid #f5c4b5; }

/* ══ EMPTY ══ */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-emoji { font-size: 52px; margin-bottom: 12px; }
.empty p { font-size: 14px; color: var(--text-mid); }

/* ══ STATS BAR ══ */
.statsbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--white);
  border-top: 1.5px solid var(--border);
  padding: 8px 16px calc(var(--safe-bottom) + 8px);
  display: flex;
  justify-content: space-around;
  z-index: 99;
  box-shadow: 0 -2px 12px rgba(26,21,16,0.06);
}
.stat { text-align: center; }
.stat-num {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
}
.stat-label {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-top: 1px;
}
.stat-div { width: 1px; background: var(--border); align-self: stretch; margin: 2px 0; }

/* ══ MODAL ══ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,21,16,0.5);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 24px 24px 0 0;
  border: 1.5px solid var(--border);
  border-bottom: none;
  width: 100%;
  max-width: 600px;
  padding: 6px 20px calc(var(--safe-bottom) + 24px);
  animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 -8px 40px rgba(26,21,16,0.12);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 16px;
}
.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 18px;
  color: var(--text);
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mid);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.form-group input,
.form-group select {
  width: 100%;
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.form-group input:focus,
.form-group select:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
  background: var(--white);
}
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.btn-cancel {
  flex: 1;
  padding: 13px;
  background: var(--cream2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text-mid);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.btn-save {
  flex: 2;
  padding: 13px;
  background: var(--green);
  border: none;
  border-radius: 14px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(45,106,79,0.3);
  transition: opacity 0.15s;
}
.btn-save:active { opacity: 0.85; }

.hint-text {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  padding-left: 4px;
}

.results-meta {
  font-size: 12px;
  color: var(--text-dim);
  padding: 14px 0 4px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo-icon">🛒</div>
        <div class="logo-text">Freshket</div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="search" placeholder="Search & compare prices…" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <button class="add-btn" onclick="openModal()">+</button>
    </div>
    <div class="filterbar">
      <div class="filter-row" id="filterRow">
        <div class="chip active" onclick="setFilter('all',this)">All</div>
        <div class="chip" onclick="setFilter('hk',this)">🇭🇰 HK Stores</div>
        <div class="chip" onclick="setFilter('costco',this)">Costco SZ</div>
        <div class="chip" onclick="setFilter('sams',this)">Sam's SZ</div>
        <div class="chip" onclick="setFilter('hkd',this)">HKD only</div>
        <div class="chip" onclick="setFilter('cny',this)">CNY only</div>
      </div>
    </div>
  </div>
</div>

<div class="content" id="content"></div>

<div class="statsbar">
  <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Items</div></div>
  <div class="stat-div"></div>
  <div class="stat"><div class="stat-num" id="sHK">0</div><div class="stat-label">HK Stores</div></div>
  <div class="stat-div"></div>
  <div class="stat"><div class="stat-num" id="sCostco">0</div><div class="stat-label">Costco SZ</div></div>
  <div class="stat-div"></div>
  <div class="stat"><div class="stat-num" id="sSams">0</div><div class="stat-label">Sam's SZ</div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Item</div>
    <div class="form-group">
      <label>Item Name</label>
      <input type="text" id="fItem" placeholder="e.g. Carrots">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantity</label>
        <input type="text" id="fQty" placeholder="e.g. 500g, 2pcs, 1kg">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select id="fCurrency">
          <option value="HKD">HKD</option>
          <option value="CNY">CNY</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Price</label>
      <input type="number" id="fPrice" placeholder="0.00" step="0.01" min="0">
    </div>
    <div class="form-group">
      <label>Store</label>
      <select id="fStore">
        <option>PARKnSHOP</option>
        <option>Wellcome</option>
        <option>Taste</option>
        <option>Sweet Decorations</option>
        <option>DS Groceries</option>
        <option>DON DON DONKI</option>
        <option>Green (HK)</option>
        <option>Costco Shenzhen</option>
        <option>Sam's Club Shenzhen</option>
        <option>Other</option>
      </select>
    </div>
    <div class="hint-text">💡 Quantity tip: use "500g", "1kg", "2pcs", "1L", "2lb" for best price comparison</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<script>
// ══ DATA ══
const SEED = [
  {item:'White vinegar',qty:'500ml',currency:'HKD',price:12.9,store:'PARKnSHOP'},
  {item:'Citric acid',qty:'30g',currency:'HKD',price:8.1,store:'Sweet Decorations'},
  {item:'Carrots',qty:'500g',currency:'HKD',price:8.9,store:'Wellcome'},
  {item:'Carrots, Australian',qty:'1kg',currency:'HKD',price:13.0,store:'Wellcome'},
  {item:'Carrots, Australian',qty:'1kg',currency:'HKD',price:14.9,store:'Taste'},
  {item:'Carrots',qty:'1kg',currency:'HKD',price:10.9,store:'Taste'},
  {item:'Celery',qty:'1pc',currency:'HKD',price:13.9,store:'Wellcome'},
  {item:'Cucumbers',qty:'2pcs',currency:'HKD',price:12.9,store:'Wellcome'},
  {item:'Cucumbers',qty:'per lb',currency:'HKD',price:19.9,store:'Taste'},
  {item:'Shallots',qty:'190g',currency:'HKD',price:9.9,store:'Wellcome'},
  {item:'Onions',qty:'2pcs',currency:'HKD',price:10.0,store:'Wellcome'},
  {item:'Avocados',qty:'4pcs',currency:'HKD',price:29.5,store:'Wellcome'},
  {item:'Beef slices',qty:'200g',currency:'HKD',price:28.0,store:'DS Groceries'},
  {item:'Crab sticks',qty:'600g',currency:'CNY',price:52.9,store:'Costco Shenzhen'},

// ══ Unit normalisation ══
function parseQty(qtyStr) {
  if (!qtyStr || qtyStr === '???' || qtyStr === '—') return null;
  const s = qtyStr.toLowerCase().trim();

  // patterns: number × number unit  e.g. "500g×8", "6×1L", "2×240g", "170g×10"
  const multi = s.match(/^([\d.]+)\s*[x×]\s*([\d.]+)\s*(g|kg|ml|l|pcs?|pc|lb|pieces?)?/) ||
                s.match(/^([\d.]+)\s*(g|kg|ml|l|lb)?\s*[x×]\s*([\d.]+)/);
  if (multi) {
    // figure out which is count and which is measure
    const a = parseFloat(multi[1]);
    const b = parseFloat(multi[2] || multi[3] || '1');
    const unit = (multi[3] || multi[2] || '').toLowerCase();
    const total = a * b;
    return normaliseUnit(total, unit || 'unit');
  }

  // e.g. "per lb", "per kg"
  const perMatch = s.match(/^per\s*(lb|kg|g|ml|l)/);
  if (perMatch) return normaliseUnit(1, perMatch[1]);

  // e.g. "~1.66kg", "≈500g"
  const approx = s.match(/[~≈]?([\d.]+)\s*(g|kg|ml|l|lb|pcs?|pc|pieces?|pack|each)/);
  if (approx) return normaliseUnit(parseFloat(approx[1]), approx[2]);

  // plain number + unit  e.g. "500g", "1.2kg", "200ml", "2pcs"
  const plain = s.match(/^([\d.]+)\s*(g|kg|ml|l|lb|pcs?|pc|pieces?|pack|each)?/);
  if (plain) return normaliseUnit(parseFloat(plain[1]), plain[2] || 'unit');

  return null;
}

function normaliseUnit(amount, unit) {
  const u = (unit || '').toLowerCase().replace(/s$/, ''); // strip plural
  switch(u) {
    case 'g':    return { amount: amount / 1000, unit: 'kg' };
    case 'kg':   return { amount, unit: 'kg' };
    case 'ml':   return { amount: amount / 1000, unit: 'L' };
    case 'l':    return { amount, unit: 'L' };
    case 'lb':   return { amount: amount * 0.4536, unit: 'kg' };
    case 'pc':
    case 'pcs':
    case 'piece':
    case 'each': return { amount, unit: 'pc' };
    case 'pack': return { amount, unit: 'pack' };
    default:     return { amount, unit: u || 'unit' };
  }
}

function pricePerUnit(item) {
  const parsed = parseQty(item.qty);
  if (!parsed || parsed.amount === 0) return null;
  return { ppu: item.price / parsed.amount, unit: parsed.unit };
}

function formatPPU(ppu, unit, currency) {
  const sym = currency === 'HKD' ? 'HK$' : '¥';
  const val = ppu < 10 ? ppu.toFixed(2) : ppu.toFixed(1);
  return `${sym}${val}/${unit}`;
}

// ══ State ══
let items = [];
let activeFilter = 'all';
let editIdx = null;

function storeType(store) {
  if (!store) return 'hk';
  const s = store.toLowerCase();
  if (s.includes('costco')) return 'costco';
  if (s.includes("sam's") || s.includes('sams')) return 'sams';
  return 'hk';
}

function storeEmoji(type) {
  return type === 'hk' ? '🇭🇰' : '🇨🇳';
}

function init() {
  const saved = localStorage.getItem('freshket_v2');
  items = saved ? JSON.parse(saved) : SEED.map((d,i) => ({...d, id:i}));
  if (!saved) persist();
  render();
}

function persist() {
  localStorage.setItem('freshket_v2', JSON.stringify(items));
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return items.filter(item => {
    const type = storeType(item.store);
    const matchF =
      activeFilter === 'all' ||
      activeFilter === type ||
      (activeFilter === 'hkd' && item.currency === 'HKD') ||
      (activeFilter === 'cny' && item.currency === 'CNY');
    const matchQ = !q ||
      item.item.toLowerCase().includes(q) ||
      (item.store||'').toLowerCase().includes(q) ||
      (item.qty||'').toLowerCase().includes(q);
    return matchF && matchQ;
  });
}

// CNY → HKD exchange rate
const CNY_TO_HKD = 1.07;

function toHKD(price, currency) {
  return currency === 'CNY' ? price * CNY_TO_HKD : price;
}

// Group ALL search-matching items into ONE group by the search query keyword.
// Secondary grouping: if items clearly belong to different product categories
// (e.g. "olive oil" vs just "oil"), split them. But "eggs", "carrots" etc → all one group.
function groupBySearchQuery(filtered, q) {
  // Normalise item name: strip everything after first comma for grouping key
  // e.g. "Carrots, Australian" → "carrots", "Eggs, Tiansheng rangeland" → "eggs"
  function baseKey(itemName) {
    return itemName.toLowerCase().split(',')[0].trim().replace(/\s+/g,' ');
  }

  const groups = {};
  filtered.forEach(item => {
    const key = baseKey(item.item);
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });
  return groups;
}

function render() {
  const q = document.getElementById('search').value.trim();
  const filtered = getFiltered();
  const content = document.getElementById('content');

  // Update stats
  const hkItems = items.filter(i => storeType(i.store) === 'hk');
  const costcoItems = items.filter(i => storeType(i.store) === 'costco');
  const samsItems = items.filter(i => storeType(i.store) === 'sams');
  document.getElementById('sTotal').textContent = items.length;
  document.getElementById('sHK').textContent = hkItems.length;
  document.getElementById('sCostco').textContent = costcoItems.length;
  document.getElementById('sSams').textContent = samsItems.length;

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty"><div class="empty-emoji">🥦</div><p>No items found.<br>Try a different search or filter.</p></div>`;
    return;
  }

  // ── SEARCH MODE: show comparison view ──
  if (q.length > 0) {
    renderComparison(filtered, q, content);
  } else {
    renderBrowse(filtered, content);
  }
}

function renderComparison(filtered, q, content) {
  // Group all matching items by base name (strip everything after comma)
  const groups = groupBySearchQuery(filtered, q);
  let html = `<div class="results-meta">${filtered.length} result${filtered.length!==1?'s':''} for "<strong>${q}</strong>" · ranked by HK$ value</div>`;

  Object.entries(groups).forEach(([key, groupItems]) => {
    if (groupItems.length === 0) return;

    // Compute PPU for each, normalised to HKD for ranking
    const withPPU = groupItems.map(item => {
      const p = pricePerUnit(item);
      const ppuRaw = p ? p.ppu : null;
      const ppuHKD = ppuRaw !== null ? toHKD(ppuRaw, item.currency) : null;
      return { item, ppuRaw, ppuHKD, ppuUnit: p ? p.unit : null };
    });

    // Sort: items with PPU first (by HKD-normalised PPU asc), then items without PPU
    const withVal = withPPU.filter(x => x.ppuHKD !== null).sort((a,b) => a.ppuHKD - b.ppuHKD);
    const withoutVal = withPPU.filter(x => x.ppuHKD === null);
    const sorted = [...withVal, ...withoutVal];

    const bestHKD = withVal.length > 0 ? withVal[0].ppuHKD : null;
    const worstHKD = withVal.length > 1 ? withVal[withVal.length-1].ppuHKD : null;

    // Display group title — use the search query capitalised, or first item name if only 1 result
    const groupTitle = groupItems.length === 1
      ? groupItems[0].item
      : q.charAt(0).toUpperCase() + q.slice(1);

    html += `
      <div class="comparison-header">
        <div class="comparison-title">${groupTitle}</div>
        <div class="comparison-subtitle">${groupItems.length} result${groupItems.length!==1?'s':''}</div>
      </div>`;

    html += `<div class="comparison-card">`;
    sorted.forEach((entry, i) => {
      const { item, ppuRaw, ppuHKD, ppuUnit } = entry;
      const rank = i + 1;
      const type = storeType(item.store);
      const sym = item.currency === 'HKD' ? 'HK$' : '¥';
      const isBest = ppuHKD !== null && ppuHKD === bestHKD && withVal.length > 1;

      let rankHtml = '';
      if (ppuHKD !== null) {
        if (rank === 1) rankHtml = `<div class="rank-badge rank-1">🥇</div>`;
        else if (rank === 2) rankHtml = `<div class="rank-badge rank-2">2</div>`;
        else if (rank === 3) rankHtml = `<div class="rank-badge rank-3">3</div>`;
        else rankHtml = `<div class="rank-badge rank-other">${rank}</div>`;
      } else {
        rankHtml = `<div class="rank-badge rank-other">—</div>`;
      }

      // Show original currency price-per-unit + HKD equivalent if CNY
      let ppuStr = '—';
      let ppuEquivStr = '';
      if (ppuRaw !== null && ppuUnit) {
        ppuStr = formatPPU(ppuRaw, ppuUnit, item.currency);
        if (item.currency === 'CNY') {
          ppuEquivStr = `≈ HK$${(ppuHKD < 10 ? ppuHKD.toFixed(2) : ppuHKD.toFixed(1))}/${ppuUnit}`;
        }
      }
      const totalStr = `${sym}${item.price.toFixed(2)} · ${item.qty||'?'}`;

      // savings bar
      let barHtml = '';
      if (ppuHKD !== null && bestHKD !== null && worstHKD !== null && worstHKD !== bestHKD) {
        const pct = Math.round(((worstHKD - ppuHKD) / (worstHKD - bestHKD)) * 100);
        const isExpensive = pct < 30;
        const savingVsBest = bestHKD !== null && ppuHKD !== null && ppuHKD !== bestHKD
          ? `${Math.round(((ppuHKD - bestHKD) / bestHKD) * 100)}% more than best`
          : '✓ Best value';
        barHtml = `
          <div class="savings-bar-wrap">
            <div class="savings-bar"><div class="savings-bar-fill ${isExpensive?'expensive':''}" style="width:${Math.max(pct,4)}%"></div></div>
            <div class="savings-label">${isBest ? '✓ Best value' : savingVsBest}</div>
          </div>`;
      }

      const idx = items.indexOf(item);
      html += `
        <div>
          <div class="comp-row" onclick="toggleCard(${idx})">
            ${rankHtml}
            <div class="store-dot dot-${type}"></div>
            <div class="comp-main">
              <div class="comp-store">${item.store}</div>
              <div class="comp-qty">${item.item} · ${item.qty||'?'}</div>
              ${ppuEquivStr ? `<div class="comp-qty" style="color:var(--green-mid);font-size:10px;">${ppuEquivStr}</div>` : ''}
            </div>
            <div class="comp-prices">
              ${isBest ? `<div class="best-badge">Best</div>` : ''}
              <div class="comp-unit-price ${isBest?'best':''}">${ppuStr}</div>
              <div class="comp-total-price">${totalStr}</div>
            </div>
          </div>
          ${barHtml}
        </div>`;
    });
    html += `</div>`;
  });

  content.innerHTML = html;
}

function renderBrowse(filtered, content) {
  // Group by store
  const byStore = {};
  filtered.forEach(item => {
    const s = item.store || 'Unknown';
    if (!byStore[s]) byStore[s] = [];
    byStore[s].push(item);
  });

  let html = `<div class="results-meta">${filtered.length} item${filtered.length!==1?'s':''}</div>`;

  // Sort stores: HK first, then Costco, then Sam's
  const storeOrder = ['PARKnSHOP','Wellcome','Taste','Sweet Decorations','DS Groceries','DON DON DONKI','Green (HK)','Costco Shenzhen',"Sam's Club Shenzhen"];
  const sortedStores = Object.keys(byStore).sort((a,b) => {
    const ai = storeOrder.indexOf(a); const bi = storeOrder.indexOf(b);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });

  const storeIcons = {
    'PARKnSHOP':'🏪','Wellcome':'🛒','Taste':'🍽️','Sweet Decorations':'🧁',
    'DS Groceries':'🥩','DON DON DONKI':'🎌','Green (HK)':'🌿',
    'Costco Shenzhen':'🏬',"Sam's Club Shenzhen":'🏪'
  };

  sortedStores.forEach(store => {
    const storeItems = byStore[store];
    const type = storeType(store);
    const icon = storeIcons[store] || (type === 'hk' ? '🇭🇰' : '🇨🇳');

    html += `
      <div class="section-header">
        <div class="section-icon ${type}">${icon}</div>
        <div class="section-name">${store}</div>
        <div class="section-count">${storeItems.length}</div>
      </div>`;

    storeItems.forEach(item => {
      const idx = items.indexOf(item);
      const sym = item.currency === 'HKD' ? 'HK$' : '¥';
      const p = pricePerUnit(item);
      const ppuStr = p ? formatPPU(p.ppu, p.unit, item.currency) : null;

      html += `
        <div class="item-card" data-type="${type}" data-idx="${idx}" onclick="toggleCard(${idx})">
          <div class="card-top">
            <div class="item-name">${item.item}</div>
            <div class="item-price-col">
              <div class="item-price">${sym}${item.price.toFixed(2)}</div>
              ${ppuStr ? `<div class="item-unit">${ppuStr}</div>` : ''}
            </div>
          </div>
          <div class="item-meta">
            <span class="store-chip ${type}">${store}</span>
            <span class="qty-text">${item.qty||'—'}</span>
          </div>
          <div class="card-expanded">
            <div class="exp-row"><span>Currency</span><span>${item.currency}</span></div>
            <div class="exp-row"><span>Quantity</span><span>${item.qty||'—'}</span></div>
            ${ppuStr ? `<div class="exp-row"><span>Price per unit</span><span>${ppuStr}</span></div>` : ''}
            <div class="card-actions">
              <button class="act-btn edit-btn" onclick="event.stopPropagation();editItem(${idx})">✏️ Edit</button>
              <button class="act-btn del-btn" onclick="event.stopPropagation();deleteItem(${idx})">🗑 Delete</button>
            </div>
          </div>
        </div>`;
    });
  });

  content.innerHTML = html;
}

function toggleCard(idx) {
  const card = document.querySelector(`[data-idx="${idx}"]`);
  if (!card) return;
  const wasOpen = card.classList.contains('expanded');
  document.querySelectorAll('.item-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasOpen) card.classList.add('expanded');
}

function openModal(edit = null) {
  editIdx = edit;
  document.getElementById('modalTitle').textContent = edit !== null ? 'Edit Item' : 'Add Item';
  if (edit !== null) {
    const it = items[edit];
    document.getElementById('fItem').value = it.item;
    document.getElementById('fQty').value = it.qty || '';
    document.getElementById('fCurrency').value = it.currency;
    document.getElementById('fPrice').value = it.price;
    document.getElementById('fStore').value = it.store || '';
  } else {
    document.getElementById('fItem').value = '';
    document.getElementById('fQty').value = '';
    document.getElementById('fCurrency').value = 'HKD';
    document.getElementById('fPrice').value = '';
    document.getElementById('fStore').value = 'PARKnSHOP';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('fItem').focus(), 350);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editIdx = null;
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveItem() {
  const item = document.getElementById('fItem').value.trim();
  const qty = document.getElementById('fQty').value.trim();
  const currency = document.getElementById('fCurrency').value;
  const price = parseFloat(document.getElementById('fPrice').value);
  const store = document.getElementById('fStore').value;
  if (!item || isNaN(price) || price < 0) {
    document.getElementById('fItem').focus();
    return;
  }
  if (editIdx !== null) {
    items[editIdx] = { ...items[editIdx], item, qty, currency, price, store };
  } else {
    items.push({ item, qty, currency, price, store, id: Date.now() });
  }
  persist();
  closeModal();
  render();
}

function editItem(idx) { openModal(idx); }

function deleteItem(idx) {
  if (!confirm(`Delete "${items[idx].item}"?`)) return;
  items.splice(idx, 1);
  persist();
  render();
}

document.getElementById('search').addEventListener('input', render);
init();
</script>
